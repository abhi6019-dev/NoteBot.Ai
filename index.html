<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Notebot AI Pro</title>
<link rel="stylesheet" href="style.css"/>
</head>

<body>

<div class="container">

  <div class="header">
    <h1>🧠 Notebot AI</h1>
    <p>Turn images into perfect study notes</p>
  </div>

  <label class="upload-box">
    <input type="file" id="fileInput" multiple accept="image/*"/>
    <span>Tap or Drag Images Here</span>
  </label>

  <div id="preview"></div>

  <div class="actions">
    <button onclick="generateNotes()">✨ Generate Notes</button>
    <button onclick="explainDiagram()">🧩 Explain</button>
    <button onclick="downloadPDF()">⬇ Export PDF</button>
  </div>

  <div id="loader" class="hidden">Processing AI...</div>

  <textarea id="output" placeholder="Your AI notes will appear here..."></textarea>

</div>

<script src="script.js"></script>
</body>
</html>
