<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Notebot AI</title>
<link rel="stylesheet" href="style.css"/>
</head>
<body>

<div class="app">

  <h1>🧠 Notebot AI</h1>

  <input type="file" id="fileInput" multiple accept="image/*"/>

  <div id="preview"></div>

  <div class="buttons">
    <button onclick="generateNotes()">Generate Notes</button>
    <button onclick="explainDiagram()">Explain Diagram</button>
    <button onclick="downloadPDF()">Download PDF</button>
  </div>

  <div id="loader" class="hidden">Processing AI...</div>

  <textarea id="output" placeholder="Your AI notes will appear here..."></textarea>

</div>

<script src="script.js"></script>
</body>
</html>
