<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Notebot AI</title>
  <link rel="stylesheet" href="style.css"/>
</head>

<body>

<div class="bg"></div>

<div class="app">

  <!-- SIDEBAR / HEADER -->
  <header class="top">
    <h1>🧠 Notebot AI</h1>
    <p>Turn images into notes, diagrams & exam summaries</p>
  </header>

  <!-- UPLOAD SECTION -->
  <section class="upload" id="dropBox">
    <input type="file" id="fileInput" multiple accept="image/*" hidden />

    <label for="fileInput" class="upload-card">
      📤 Drag & Drop or Click to Upload Images
      <span>Supports multiple images • AI Vision enabled</span>
    </label>
  </section>

  <!-- IMAGE PREVIEW -->
  <section id="preview" class="preview"></section>

  <!-- ACTION BUTTONS -->
  <section class="actions">
    <button onclick="generateNotes()">⚡ Generate Notes</button>
    <button onclick="explainDiagram()">📊 Explain Diagram</button>
    <button onclick="downloadPDF()">⬇ Export PDF</button>
  </section>

  <!-- OUTPUT -->
  <section class="output">
    <h2>📒 AI Output</h2>
    <textarea id="output" placeholder="Your AI-generated study notes will appear here..."></textarea>
  </section>

</div>

<script src="script.js"></script>
</body>
</html>
